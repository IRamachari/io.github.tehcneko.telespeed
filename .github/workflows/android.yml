name: Build TeleSpeed APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/telespeed.jks

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build release APK
        env:
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: ./gradlew assembleRelease --stacktrace --info

      - name: List APK output (debug)
        if: always()
        run: find app/build/outputs -name "*.apk" 2>/dev/null || echo "No APKs found"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TeleSpeed-APK
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error
